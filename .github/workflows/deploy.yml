name: Deploy Frontend

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest
          build-args: |
            VITE_BACKEND_URL=${{ secrets.VITE_BACKEND_URL }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to Lightsail Container Service
        env:
          IMAGE: ghcr.io/${{ github.repository }}:latest
          SERVICE_NAME: ${{ secrets.LIGHTSAIL_SERVICE_NAME }}
        run: |
          aws lightsail create-container-service-deployment \
            --service-name "$SERVICE_NAME" \
            --containers "{\"frontend\":{\"image\":\"$IMAGE\",\"ports\":{\"80\":\"HTTP\"}}}" \
            --public-endpoint '{"containerName":"frontend","containerPort":80,"healthCheck":{"path":"/","intervalSeconds":10,"timeoutSeconds":5,"unhealthyThreshold":2,"healthyThreshold":2}}'
