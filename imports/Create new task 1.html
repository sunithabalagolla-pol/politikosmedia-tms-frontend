<!DOCTYPE html>
<html lang="en">
<head>
    <script>
      window.FontAwesomeConfig = { autoReplaceSvg: 'nest' };
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create New Task</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              mono: ['Space Mono', 'monospace'],
            },
            colors: {
              primary: '#b23a48',
              'primary-hover': '#8f2e3a',
              'sidebar-bg': '#d4737f',
              'sidebar-header': '#8f2e3a',
              'sidebar-active': '#6b1f28',
              dark: '#050415',
            }
          }
        }
      }
    </script>
    <style>
      body { font-family: 'Inter', sans-serif; }
      ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-50 flex min-h-screen">
    <!-- Sidebar -->
    <aside id="sidebar" class="hidden lg:flex lg:flex-col w-64 bg-sidebar-bg text-white flex-shrink-0 h-screen sticky top-0">
      <!-- Sidebar Header -->
      <div class="bg-sidebar-header px-6 py-5 flex items-center justify-between">
        <div class="flex items-center gap-2">
          <i class="fa-solid fa-grip text-white text-lg"></i>
          <span class="font-mono font-bold text-sm tracking-wide">AdminPanel</span>
        </div>
      </div>
      
      <!-- Sidebar Navigation -->
      <nav class="flex-1 px-4 py-6 overflow-y-auto space-y-6">
        <!-- OVERVIEW Section -->
        <div>
          <h3 class="font-mono text-xs font-bold tracking-wider mb-3 px-3 opacity-80">OVERVIEW</h3>
          <ul class="space-y-1">
            <li><a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-white/10 transition-colors text-sm"><i class="fa-solid fa-chart-line w-4"></i><span>Overview</span></a></li>
            <li><a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-white/10 transition-colors text-sm"><i class="fa-solid fa-list-check w-4"></i><span>Tasks</span></a></li>
            <li><a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-white/10 transition-colors text-sm"><i class="fa-solid fa-table-columns w-4"></i><span>Kanban Board</span></a></li>
          </ul>
        </div>
        
        <!-- MANAGEMENT Section -->
        <div>
          <h3 class="font-mono text-xs font-bold tracking-wider mb-3 px-3 opacity-80">MANAGEMENT</h3>
          <ul class="space-y-1">
            <li><a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-white/10 transition-colors text-sm"><i class="fa-solid fa-users w-4"></i><span>Team Members</span></a></li>
            <li><a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-white/10 transition-colors text-sm"><i class="fa-solid fa-building w-4"></i><span>Departments</span></a></li>
            <li><a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-white/10 transition-colors text-sm"><i class="fa-solid fa-file-lines w-4"></i><span>Reports</span></a></li>
          </ul>
        </div>
        
        <!-- PERSONAL Section -->
        <div>
          <h3 class="font-mono text-xs font-bold tracking-wider mb-3 px-3 opacity-80">PERSONAL</h3>
          <ul class="space-y-1">
            <li><a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-white/10 transition-colors text-sm"><i class="fa-solid fa-clipboard-check w-4"></i><span>My Tasks</span></a></li>
            <li><a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-white/10 transition-colors text-sm"><i class="fa-solid fa-bell w-4"></i><span>Notifications</span></a></li>
          </ul>
        </div>
        
        <!-- SYSTEM Section -->
        <div>
          <h3 class="font-mono text-xs font-bold tracking-wider mb-3 px-3 opacity-80">SYSTEM</h3>
          <ul class="space-y-1">
            <li><a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-white/10 transition-colors text-sm"><i class="fa-solid fa-gear w-4"></i><span>Settings</span></a></li>
            <li><a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-white/10 transition-colors text-sm"><i class="fa-solid fa-circle-question w-4"></i><span>Help</span></a></li>
            <li><a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-white/10 transition-colors text-sm"><i class="fa-solid fa-user w-4"></i><span>Profile</span></a></li>
          </ul>
        </div>
      </nav>
      
      <!-- Sidebar Footer -->
      <div class="px-4 py-4 border-t border-white/10 space-y-2">
        <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-white/10 transition-colors text-sm"><i class="fa-solid fa-right-from-bracket w-4"></i><span>Logout</span></a>
        <button class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-white/10 transition-colors text-sm w-full"><i class="fa-solid fa-angles-left w-4"></i><span>Collapse</span></button>
      </div>
    </aside>

    <!-- Main Content -->
    <div class="flex-1 flex items-center justify-center p-4">
      <!-- Modal Container -->
      <div class="w-full max-w-lg bg-white rounded-2xl shadow-2xl">
        <!-- Modal Header -->
        <div class="px-6 sm:px-8 pt-6 sm:pt-8 pb-4 border-b border-gray-100">
          <div class="flex items-start justify-between">
            <div>
              <h2 class="text-xl sm:text-2xl font-bold text-gray-900">Create New Task</h2>
              <p class="text-sm text-gray-500 mt-1">Fill in the details to set up a new Task</p>
            </div>
            <button class="text-gray-400 hover:text-gray-600 transition-colors"><i class="fa-solid fa-xmark text-xl"></i></button>
          </div>
        </div>
        
        <!-- Modal Body -->
        <div class="px-6 sm:px-8 py-6 space-y-6 max-h-[calc(100vh-200px)] overflow-y-auto">
          <!-- Task Name -->
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 sm:gap-6">
            <div>
              <label class="block text-xs font-semibold text-gray-700 uppercase tracking-wide mb-2">TASK Name <span class="text-primary">*</span></label>
              <input type="text" placeholder="e.g. Swiggy Q2 Campaign" class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all">
            </div>
          </div>
          
          <!-- Description -->
          <div>
            <label class="block text-xs font-semibold text-gray-700 uppercase tracking-wide mb-2">Description</label>
            <textarea rows="3" placeholder="What is this project about?" class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all resize-none"></textarea>
          </div>
          
          <!-- Start Date & End Date -->
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 sm:gap-6">
            <div>
              <label class="block text-xs font-semibold text-gray-700 uppercase tracking-wide mb-2">Start Date</label>
              <input type="date" class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all">
            </div>
            <div>
              <label class="block text-xs font-semibold text-gray-700 uppercase tracking-wide mb-2">End Date</label>
              <input type="date" class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all">
            </div>
          </div>
          
          <!-- Departments -->
          <div>
            <label class="block text-xs font-semibold text-gray-700 uppercase tracking-wide mb-3">Departments</label>
            <div class="flex flex-wrap gap-2">
              <button class="px-4 py-2 bg-blue-50 text-blue-600 border border-blue-200 rounded-lg text-sm font-medium hover:bg-blue-100 transition-colors">Tech</button>
              <button class="px-4 py-2 bg-purple-50 text-purple-600 border border-purple-200 rounded-lg text-sm font-medium hover:bg-purple-100 transition-colors">Media</button>
              <button class="px-4 py-2 bg-orange-50 text-orange-600 border border-orange-200 rounded-lg text-sm font-medium hover:bg-orange-100 transition-colors">Video Editing</button>
              <button class="px-4 py-2 bg-green-50 text-green-600 border border-green-200 rounded-lg text-sm font-medium hover:bg-green-100 transition-colors">SEO</button>
            </div>
          </div>
          
          <!-- Assign Members -->
          <div>
            <label class="block text-xs font-semibold text-gray-700 uppercase tracking-wide mb-2">Assign Members</label>
            <div class="relative">
              <select class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm text-gray-500 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all appearance-none bg-white">
                <option>Select team members...</option>
                <option>John Doe</option>
                <option>Jane Smith</option>
                <option>Mike Johnson</option>
              </select>
              <div class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none">
                <i class="fa-solid fa-chevron-down text-gray-400 text-xs"></i>
              </div>
            </div>
          </div>
          
          <!-- Status -->
          <div>
            <label class="block text-xs font-semibold text-gray-700 uppercase tracking-wide mb-3">Status</label>
            <div class="grid grid-cols-3 gap-3">
              <button class="px-4 py-3 bg-red-50 border-2 border-primary rounded-lg text-sm font-semibold text-primary hover:bg-red-100 transition-all flex flex-col items-center justify-center gap-1">
                <i class="fa-solid fa-circle text-xs"></i>
                <span>Active</span>
              </button>
              <button class="px-4 py-3 bg-white border-2 border-gray-200 rounded-lg text-sm font-semibold text-gray-600 hover:bg-gray-50 transition-all flex flex-col items-center justify-center gap-1">
                <i class="fa-solid fa-pause text-xs"></i>
                <span>On Hold</span>
              </button>
              <button class="px-4 py-3 bg-white border-2 border-gray-200 rounded-lg text-sm font-semibold text-gray-600 hover:bg-gray-50 transition-all flex flex-col items-center justify-center gap-1">
                <i class="fa-solid fa-check text-xs"></i>
                <span>Completed</span>
              </button>
            </div>
          </div>
        </div>
        
        <!-- Modal Footer -->
        <div class="px-6 sm:px-8 py-4 sm:py-6 border-t border-gray-100 flex flex-col-reverse sm:flex-row items-center justify-end gap-3">
          <button class="w-full sm:w-auto px-6 py-2.5 border border-gray-200 rounded-lg text-sm font-semibold text-gray-700 hover:bg-gray-50 transition-colors">Cancel</button>
          <button class="w-full sm:w-auto px-6 py-2.5 bg-primary hover:bg-primary-hover text-white rounded-lg text-sm font-semibold transition-colors shadow-sm flex items-center justify-center gap-2">
            <i class="fa-solid fa-plus text-xs"></i>
            Create Task
          </button>
        </div>
      </div>
    </div>
  </body>
</html>
